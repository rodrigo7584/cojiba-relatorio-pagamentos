services:
  back:
    build:
      context: ./back
    container_name: back
    ports:
      - "8000:8000"

    volumes:
      - ./back:/app

    command: >
      uvicorn app:app
      --host 0.0.0.0
      --port 8000
      --reload

    environment:
      - PYTHONUNBUFFERED=1

  front:
    build:
      context: ./front
    container_name: front

    ports:
      - "3000:3000"

    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next

    command: npm run dev

    depends_on:
      - back

    environment:
      - NEXT_PUBLIC_API_URL=http://back:8000